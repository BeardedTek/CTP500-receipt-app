server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # JSON directory index so the app can discover user `*.yaml` without manifest.yaml (see mergeUserPrinterFragments).
  location = /printers {
    return 301 /printers/;
  }
  location ^~ /printers/ {
    autoindex on;
    autoindex_format json;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
